<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Fundo verde escuro arredondado -->
  <rect width="300" height="300" rx="60" fill="#1B4D37"/>
  
  <!-- Casa lateral esquerda (teal) -->
  <polygon points="72,230 72,155 105,120 138,155 138,230" fill="#52B788"/>
  <polygon points="72,155 105,120 138,155" fill="#3A9E72"/>
  <rect x="82" y="175" width="22" height="18" rx="3" fill="#D8F3DC"/>
  <rect x="114" y="175" width="16" height="18" rx="3" fill="#D8F3DC"/>
  <rect x="100" y="200" width="18" height="30" rx="3" fill="#2D6A4F"/>

  <!-- Casa lateral direita (teal) -->
  <polygon points="162,230 162,155 195,120 228,155 228,230" fill="#52B788"/>
  <polygon points="162,155 195,120 228,155" fill="#3A9E72"/>
  <rect x="172" y="175" width="22" height="18" rx="3" fill="#D8F3DC"/>
  <rect x="204" y="175" width="16" height="18" rx="3" fill="#D8F3DC"/>
  <rect x="186" y="200" width="18" height="30" rx="3" fill="#2D6A4F"/>

  <!-- Casa central grande (creme/branco) -->
  <polygon points="150,55 240,140 240,240 60,240 60,140" fill="#FEFAE0"/>
  <polygon points="150,55 240,140 60,140" fill="#F0EDD0"/>
  <rect x="108" y="168" width="30" height="24" rx="4" fill="#D8F3DC"/>
  <rect x="162" y="168" width="30" height="24" rx="4" fill="#D8F3DC"/>
  <rect x="126" y="198" width="48" height="42" rx="4" fill="#2D6A4F"/>

  <!-- Linha pontilhada laranja embaixo -->
  <line x1="75" y1="248" x2="225" y2="248" stroke="#E76F51" stroke-width="3" stroke-dasharray="8,6"/>
  
  <!-- Três pontinhos laranja -->
  <circle cx="90" cy="248" r="7" fill="#E76F51"/>
  <circle cx="150" cy="248" r="7" fill="#E76F51"/>
  <circle cx="210" cy="248" r="7" fill="#E76F51"/>
</svg>
